services:
  - type: web
    name: aare-signal-hub
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aare-signal-hub-db
          property: connectionString
      - key: PROVIDER_KEYS
        sync: false
      - key: CONSUMER_KEY
        sync: false
      - key: QUANTUM_BRIDGE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: aare-signal-hub-db
    plan: free
    databaseName: signal_hub
    user: signal_hub
